<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style_home.css">
    <link rel="shortcut icon" href="../photo/logo.avif" type="image/x-icon">
    <title>Home</title>
</head>
<body>
    <div class="container">
        <div class="head">
            <div class="logo">
                <img src="../photo/logo.avif" alt="logo">
                <button id="bell"><i class="fa-regular fa-bell"></i></button>
            </div>
            <div class="slogan">
                <p class="subtitle">Xin chào</p>
                <h1 class="title">Sẵn sàng tận hưởng?</h1>
            </div>
            <div class="visit">
                <i class="fa-solid fa-location-dot"></i>
                <div class="location">Vinhomes Grand Park, Hồ Chí Minh</div>
            </div>
            <div class="search">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
                <input type="text" id="search" placeholder="Tìm trải nghiệm...">
            </div>
        </div>
        <div class="sidebar">
            <a href="" class="list"><i class="fa fa-house"></i><span>Lưu trú</span></a>
            <a href="" class="list"><i class="fa fa-star"></i><span></span>Ẩm thực</span></a>
            <a href="" class="list"><i class="fa fa-calendar"></i><span></span>Spa</span></a>
            <a href="" class="list"><i class="fa fa-users"></i><span></span>Nhóm</span></a>
        </div>
        
    </div>
</body>
</html>
